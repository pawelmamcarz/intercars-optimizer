name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff==0.6.9
      - run: ruff check app/ --select E,F,W --ignore E501,E402
      - name: JSON syntax gate
        run: |
          python -c "import json; json.load(open('railway.json'))"
          if [ -f package-lock.json ]; then python -c "import json; json.load(open('package-lock.json'))"; fi

  test:
    name: Pytest (${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: System deps for optional OCR parser
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-pol poppler-utils
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest with coverage
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
        env:
          FLOW_JWT_SECRET: ci-test-secret-not-for-production
          FLOW_PDF_OCR_ENABLED: "true"
      # Upload coverage only on the 3.11 matrix leg to avoid racing
      # two uploads with the same SHA.
      - name: Upload coverage to Codecov
        if: matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  e2e:
    name: Browser E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: System deps for OCR (lifespan seeds still load the stack)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr poppler-utils
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: playwright install chromium --with-deps
      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tracing=retain-on-failure
        env:
          FLOW_JWT_SECRET: ci-e2e-secret
          FLOW_PDF_OCR_ENABLED: "false"
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: flow-procurement:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-run container
        run: |
          docker run -d --name flow-ci -p 8000:8000 \
            -e FLOW_JWT_SECRET=ci-smoke \
            -e FLOW_PDF_OCR_ENABLED=false \
            flow-procurement:ci
          # Give it up to 30s to boot
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Container healthy after ${i}s"
              docker logs flow-ci --tail 20
              exit 0
            fi
            sleep 1
          done
          echo "Container failed to come up"
          docker logs flow-ci
          exit 1
