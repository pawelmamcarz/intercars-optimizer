name: autobump-version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          OLD=$(cat .version)
          python3 scripts/bump_version.py
          NEW=$(cat .version)
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit bump
        if: steps.bump.outputs.old != steps.bump.outputs.new
        run: |
          git config user.name  "flow-procurement-bot"
          git config user.email "bot@flowprocurement.com"
          git add .version app/static/index.html app/static/superadmin.html
          git commit -m "chore: bump version ${{ steps.bump.outputs.old }} → ${{ steps.bump.outputs.new }} [skip ci]"
          git push origin HEAD:main
