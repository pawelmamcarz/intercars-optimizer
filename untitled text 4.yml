# Test surowego stanu pinow GPIO
# Bez komponentu opentherm - tylko odczyt pinow
binary_sensor:
  - platform: gpio
    pin:
      number: 4
      mode: INPUT
    name: "GPIO4 (D2) stan"
    id: gpio4_state

  - platform: gpio
    pin:
      number: 14
      mode: INPUT
    name: "GPIO14 (D5) stan"
    id: gpio14_state

interval:
  - interval: 500ms
    then:
      - lambda: |-
          bool g4 = id(gpio4_state).state;
          bool g14 = id(gpio14_state).state;
          ESP_LOGI("gpio_test", "GPIO4(D2)=%s  GPIO14(D5)=%s",
                   g4 ? "HIGH" : "LOW",
                   g14 ? "HIGH" : "LOW");
